name: Kaushik — Weekly KPI Report

on:
  schedule:
    # Sunday 9pm UTC = Monday 7am AEST (UTC+10)
    - cron: '0 21 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate report but do not post to Slack'
        required: false
        default: 'false'

jobs:
  weekly-kpi-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk @supabase/supabase-js airtable axios

      - name: Run weekly KPI report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_AI_ENGINEERING: ${{ secrets.SLACK_CHANNEL_AI_ENGINEERING }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/kaushik-weekly-kpi-report.js
