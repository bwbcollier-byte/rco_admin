name: Kondo — RapidAPI Subscriber & Enricher

on:
  # Run every Monday at 9am AEST (11pm UTC Sunday) to catch any newly added APIs
  schedule:
    - cron: '0 23 * * 0'

  # Run manually any time you add new APIs to the Airtable
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Check/find but take no action'
        required: false
        default: 'false'

jobs:
  subscribe:
    name: Marie — RapidAPI Subscriber
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install playwright playwright-extra puppeteer-extra-plugin-stealth axios

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run RapidAPI Subscriber
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ vars.AIRTABLE_BASE_ID }}
          AIRTABLE_LOGINS:  ${{ vars.AIRTABLE_LOGINS }}
          AIRTABLE_APIS:    ${{ vars.AIRTABLE_APIS }}
          FIELD_LOGIN_SITE_NAME: ${{ vars.FIELD_LOGIN_SITE_NAME }}
          FIELD_LOGIN_EMAIL:     ${{ vars.FIELD_LOGIN_EMAIL }}
          FIELD_LOGIN_PASSWORD:  ${{ secrets.FIELD_LOGIN_PASSWORD }}
          FIELD_LOGIN_STATUS:    ${{ vars.FIELD_LOGIN_STATUS }}
          FIELD_API_SUBSCRIBED:  ${{ vars.FIELD_API_SUBSCRIBED }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_AI_ENGINEERING: ${{ secrets.SLACK_CHANNEL_AI_ENGINEERING }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/marie-rapidapi-subscriber.js

      - name: Upload debug screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapidapi-subscriber-screenshots
          path: /tmp/rapidapi-*.png
          retention-days: 7
          overwrite: true
