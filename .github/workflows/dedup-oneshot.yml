name: Dedup One-Shot

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  dedup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run dedup
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: python scripts/dedup_oneshot.py
