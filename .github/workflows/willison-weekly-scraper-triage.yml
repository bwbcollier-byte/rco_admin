name: Willison — Weekly Scraper Triage

on:
  schedule:
    # Tuesday 9:30pm UTC = Wednesday 7:30am AEST (UTC+10)
    # Runs after Hightower (Sun) and Karpathy (Tue) — complements both
    - cron: '30 21 * * 2'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate triage but do not post to Slack'
        required: false
        default: 'false'

jobs:
  weekly-scraper-triage:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk airtable axios

      - name: Run weekly scraper triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_AI_ENGINEERING: ${{ secrets.SLACK_CHANNEL_AI_ENGINEERING }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/willison-weekly-scraper-triage.js
