name: Kondo — Account Creator

on:
  schedule:
    # 9am AEST daily (11pm UTC)
    - cron: '0 23 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Check/find but take no action'
        required: false
        default: 'false'
      max_per_run:
        description: 'Max signups to process this run (default 20)'
        required: false
        default: '20'

jobs:
  signup:
    name: Marie — Account Creator
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install playwright axios

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Account Creator
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_AI_ENGINEERING: ${{ secrets.SLACK_CHANNEL_AI_ENGINEERING }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SIGNUP_PASSWORD: ${{ secrets.SIGNUP_PASSWORD }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MAX_PER_RUN: ${{ github.event.inputs.max_per_run || vars.SIGNUP_MAX_PER_RUN || '20' }}
        run: node scripts/marie-account-creator.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: marie-signup-screenshots
          path: /tmp/marie-signup-*.png
          retention-days: 7
          overwrite: true
