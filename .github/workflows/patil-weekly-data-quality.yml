name: Patil — Weekly Data Quality Brief

on:
  schedule:
    # Wednesday 9pm UTC = Thursday 7am AEST (UTC+10)
    - cron: '0 21 * * 3'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate brief but do not post to Slack'
        required: false
        default: 'false'

jobs:
  weekly-data-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk @supabase/supabase-js airtable axios

      - name: Run weekly data quality brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_AI_ENGINEERING: ${{ secrets.SLACK_CHANNEL_AI_ENGINEERING }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/patil-weekly-data-quality.js
