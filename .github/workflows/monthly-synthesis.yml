name: Monthly All-Staff Synthesis

on:
  schedule:
    # First Wednesday of each month, 7:00am AEST (Tuesday 9pm UTC)
    # Script checks internally if it's the first Wednesday of the month
    - cron: '0 21 * * 3'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate synthesis but do not post to Slack'
        required: false
        default: 'false'

jobs:
  monthly-synthesis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install @anthropic-ai/sdk airtable axios
      - name: Run monthly all-staff synthesis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_AI_ENGINEERING: ${{ secrets.SLACK_CHANNEL_AI_ENGINEERING }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/monthly-synthesis.js
