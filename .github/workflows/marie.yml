name: Kondo — Daily Automation

on:
  schedule:
    # Every hour — tasks decide internally whether to run
    - cron: '0 * * * *'

  workflow_dispatch:
    inputs:
      task:
        description: 'Which task to run (auto=schedule-based, apartment, gym, flights, morning, signup, all)'
        required: false
        default: 'auto'
      dry_run:
        description: 'Check/find but take no action'
        required: false
        default: 'false'

jobs:
  run:
    name: Marie
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install playwright axios googleapis

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Download apartment state
        uses: actions/download-artifact@v4
        with:
          name: marie-apartment-state
          path: /tmp/
        continue-on-error: true  # OK on first run

      - name: Download flight state
        uses: actions/download-artifact@v4
        with:
          name: marie-flight-state
          path: /tmp/
        continue-on-error: true  # OK on first run

      - name: Run Marie
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_AI_ENGINEERING: ${{ secrets.SLACK_CHANNEL_AI_ENGINEERING }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          MINDBODY_EMAIL: ${{ secrets.MINDBODY_EMAIL }}
          MINDBODY_PASSWORD: ${{ secrets.MINDBODY_PASSWORD }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}
          GCAL_REFRESH_TOKEN: ${{ secrets.GCAL_REFRESH_TOKEN }}
          SIGNUP_PASSWORD: ${{ secrets.SIGNUP_PASSWORD }}
          FLIGHT_ROUTES: ${{ vars.FLIGHT_ROUTES || 'SYD-TYO' }}
          FLIGHT_MAX_PRICE_AUD: ${{ vars.FLIGHT_MAX_PRICE_AUD || '900' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          TASK: ${{ github.event.inputs.task || 'auto' }}
        run: |
          if [ "$TASK" = "signup" ]; then
            node scripts/marie-account-creator.js
          else
            node scripts/marie.js
          fi

      - name: Upload apartment state
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: marie-apartment-state
          path: /tmp/social-apartment-state.json
          retention-days: 90
          overwrite: true

      - name: Upload flight state
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: marie-flight-state
          path: /tmp/marie-flight-state.json
          retention-days: 90
          overwrite: true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: marie-screenshots
          path: /tmp/marie-*.png
          retention-days: 7
          overwrite: true
