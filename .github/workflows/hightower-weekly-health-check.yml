name: Hightower — Weekly Infrastructure Health Check

on:
  schedule:
    # Sunday 9:30pm UTC = Monday 7:30am AEST (UTC+10)
    - cron: '30 21 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate report but do not post to Slack'
        required: false
        default: 'false'

jobs:
  weekly-health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk airtable axios

      - name: Run weekly health check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_AI_ENGINEERING: ${{ secrets.SLACK_CHANNEL_AI_ENGINEERING }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/hightower-weekly-health-check.js
